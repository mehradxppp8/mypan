<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIPAN Management Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700&display=swap');
        
        body {
            font-family: 'Vazirmatn', sans-serif;
            background-color: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            color: #e2e8f0;
            min-height: 100vh;
        }

        /* Glassmorphism Card Style */
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .btn-neon {
            transition: all 0.3s ease;
        }
        .btn-neon:hover {
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.6);
            transform: translateY(-2px);
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 4px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Login Modal -->
    <div id="login-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm">
        <div class="glass-panel p-8 rounded-2xl w-full max-w-md text-center">
            <h1 class="text-3xl font-bold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400">AIPAN</h1>
            <p class="text-gray-400 mb-6">Panel Management System</p>
            <input type="password" id="password-input" placeholder="Enter Admin Password" 
                   class="w-full bg-slate-800/50 border border-slate-600 rounded-xl px-4 py-3 mb-4 focus:outline-none focus:border-indigo-500 transition-colors text-center">
            <button onclick="login()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-xl btn-neon">
                ورود به پنل
            </button>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="dashboard" class="hidden max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex justify-between items-center mb-8 glass-panel p-6 rounded-2xl">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/30">
                    <i class="fa-solid fa-server text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold">داشبورد مدیریتی</h1>
                    <p class="text-sm text-gray-400">نسخه 1.0.0 | وضعیت: <span class="text-emerald-400">آنلاین</span></p>
                </div>
            </div>
            <button onclick="logout()" class="bg-red-500/10 text-red-400 border border-red-500/20 px-4 py-2 rounded-lg hover:bg-red-500/20 transition">
                <i class="fa-solid fa-power-off ml-2"></i> خروج
            </button>
        </header>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="glass-panel p-6 rounded-2xl relative overflow-hidden group">
                <div class="absolute right-0 top-0 w-24 h-24 bg-indigo-500/10 rounded-bl-full -mr-4 -mt-4 transition-transform group-hover:scale-110"></div>
                <h3 class="text-gray-400 text-sm mb-1">کل کاربران</h3>
                <p class="text-3xl font-bold" id="total-users">0</p>
            </div>
            <div class="glass-panel p-6 rounded-2xl relative overflow-hidden group">
                <div class="absolute right-0 top-0 w-24 h-24 bg-emerald-500/10 rounded-bl-full -mr-4 -mt-4 transition-transform group-hover:scale-110"></div>
                <h3 class="text-gray-400 text-sm mb-1">ترافیک کل</h3>
                <p class="text-3xl font-bold text-emerald-400">∞ GB</p>
            </div>
            <div class="glass-panel p-6 rounded-2xl relative overflow-hidden group">
                <div class="absolute right-0 top-0 w-24 h-24 bg-cyan-500/10 rounded-bl-full -mr-4 -mt-4 transition-transform group-hover:scale-110"></div>
                <h3 class="text-gray-400 text-sm mb-1">کاربران فعال</h3>
                <p class="text-3xl font-bold text-cyan-400" id="active-users">0</p>
            </div>
        </div>

        <!-- Users Table Section -->
        <div class="glass-panel rounded-2xl overflow-hidden">
            <div class="p-6 border-b border-white/10 flex justify-between items-center">
                <h2 class="text-xl font-bold"><i class="fa-solid fa-users ml-2 text-indigo-400"></i> مدیریت کاربران</h2>
                <button onclick="openAddModal()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg text-sm btn-neon">
                    <i class="fa-solid fa-plus ml-1"></i> کاربر جدید
                </button>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-right">
                    <thead class="bg-white/5 text-gray-400 text-sm uppercase">
                        <tr>
                            <th class="p-4">نام</th>
                            <th class="p-4">UUID</th>
                            <th class="p-4">محدودیت ترافیک</th>
                            <th class="p-4">انقضا</th>
                            <th class="p-4 text-center">عملیات</th>
                        </tr>
                    </thead>
                    <tbody id="users-list" class="divide-y divide-white/5 text-sm">
                        <!-- Rows will be injected here via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Add User Modal -->
    <div id="add-modal" class="hidden fixed inset-0 z-40 flex items-center justify-center bg-black/60 backdrop-blur-sm">
        <div class="glass-panel p-6 rounded-2xl w-full max-w-lg">
            <h3 class="text-xl font-bold mb-4">افزودن کاربر جدید</h3>
            <div class="space-y-4">
                <input type="text" id="new-name" placeholder="نام کاربر" class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 focus:border-indigo-500 outline-none">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="new-traffic" placeholder="محدودیت ترافیک (GB)" class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 focus:border-indigo-500 outline-none">
                    <input type="number" id="new-days" placeholder="مدت اعتبار (روز)" class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 focus:border-indigo-500 outline-none">
                </div>
            </div>
            <div class="mt-6 flex justify-end gap-3">
                <button onclick="closeAddModal()" class="px-4 py-2 rounded-lg text-gray-400 hover:text-white transition">انصراف</button>
                <button onclick="addUser()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2 rounded-lg btn-neon">ذخیره</button>
            </div>
        </div>
    </div>

    <script>
        let authToken = '';
        const API_URL = window.location.origin;

        async function login() {
            const pass = document.getElementById('password-input').value;
            // Simple check against backend
            const res = await fetch(`${API_URL}/api/users`, {
                headers: { 'Authorization': `Bearer ${pass}` }
            });
            
            if (res.ok) {
                authToken = pass;
                document.getElementById('login-modal').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadUsers();
            } else {
                alert('رمز عبور اشتباه است!');
            }
        }

        function logout() {
            location.reload();
        }

        async function loadUsers() {
            const res = await fetch(`${API_URL}/api/users`, {
                headers: { 'Authorization': `Bearer ${authToken}` }
            });
            const data = await res.json();
            
            const tbody = document.getElementById('users-list');
            tbody.innerHTML = '';
            
            document.getElementById('total-users').innerText = data.users.length;
            document.getElementById('active-users').innerText = data.users.filter(u => !u.is_paused).length;

            data.users.forEach(user => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-white/5 transition';
                tr.innerHTML = `
                    <td class="p-4 font-medium">${user.name}</td>
                    <td class="p-4 font-mono text-xs text-gray-400 select-all">${user.uuid}</td>
                    <td class="p-4">${user.traffic_limit ? user.traffic_limit + ' GB' : 'نامحدود'}</td>
                    <td class="p-4">${user.expiry_date ? new Date(user.expiry_date).toLocaleDateString('fa-IR') : 'دائمی'}</td>
                    <td class="p-4 text-center">
                        <button onclick="copySub('${user.uuid}')" class="text-indigo-400 hover:text-indigo-300 mx-1" title="کپی لینک"><i class="fa-solid fa-link"></i></button>
                        <button onclick="deleteUser('${user.id}')" class="text-red-400 hover:text-red-300 mx-1" title="حذف"><i class="fa-solid fa-trash"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function openAddModal() { document.getElementById('add-modal').classList.remove('hidden'); }
        function closeAddModal() { document.getElementById('add-modal').classList.add('hidden'); }

        async function addUser() {
            const name = document.getElementById('new-name').value;
            const traffic = document.getElementById('new-traffic').value;
            const days = document.getElementById('new-days').value;

            await fetch(`${API_URL}/api/users`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${authToken}`
                },
                body: JSON.stringify({ name, traffic_limit: traffic, expiry_days: days })
            });
            
            closeAddModal();
            loadUsers();
        }

        async function deleteUser(id) {
            if(confirm('آیا مطمئن هستید؟')) {
                await fetch(`${API_URL}/api/users/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                loadUsers();
            }
        }

        function copySub(uuid) {
            const link = `${window.location.origin}/sub/${uuid}`;
            navigator.clipboard.writeText(link);
            alert('لینک کپی شد: ' + link);
        }
    </script>
</body>
</html>
